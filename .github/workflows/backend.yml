name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Check linting
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

  test:
    name: Tests (${{ matrix.test-suite }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    strategy:
      fail-fast: false
      matrix:
        test-suite: [unit, integration]

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_MONGO_URI: mongodb://localhost:27017
      TEST_DB: quiz_test
      TEST_JWT_SECRET: test-secret-key-for-ci-only
      GEMINI_API_KEY: fake-key-for-tests
      CORS_ORIGINS: '["http://localhost:5173"]'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ${{ matrix.test-suite }} tests
        run: uv run pytest tests/${{ matrix.test-suite }}/ -v --tb=short --junitxml=results-${{ matrix.test-suite }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.test-suite }}
          path: backend/results-${{ matrix.test-suite }}.xml
          retention-days: 7

  coverage:
    name: Coverage Report
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_MONGO_URI: mongodb://localhost:27017
      TEST_DB: quiz_test
      TEST_JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret-key' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'fake-key-for-tests' }}
      CORS_ORIGINS: '["http://localhost:5173"]'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests with coverage
        run: >
          uv run pytest
          --cov=.
          --cov-branch
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-fail-under=70
          -v --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 14

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: uv tool install pip-audit

      - name: Audit dependencies
        run: uv run pip-audit --require-hashes=false
        continue-on-error: true
